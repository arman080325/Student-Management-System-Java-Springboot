spring.application.name=student-management-system

# Default profile = dev (zero-setup, in-memory H2). Render sets SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=dev

# --- Dev database: H2 in-memory -------------------------------------------
spring.datasource.url=jdbc:h2:mem:sms;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console (dev only)
spring.h2.console.enabled=true

# Server
server.port=${PORT:8080}

# Feature flags
app.allow-clear-all=true
