# --- Production: PostgreSQL (Neon) ----------------------------------------
# Everything comes from environment variables. NO credentials are committed.
# Set these on Render:
#   SPRING_DATASOURCE_URL       e.g. jdbc:postgresql://<host>/<db>?sslmode=require
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# H2 console must never be exposed in production
spring.h2.console.enabled=false

server.port=${PORT:8080}

# Destructive "clear all" is disabled on the public demo
app.allow-clear-all=false

# Actuator: expose only health (for Render health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
